project:
  name: rec_8_hotzones
  run_name: ppocrv5_mobile_rec_cpu

paths:
  raw_frames: data/raw_frames
  rec_dataset: data/rec_dataset
  paddleocr_source: resources/PaddleOCR
  pretrained_dir: resources/pretrained
  runs: runs
  models: models
  outputs: outputs

model:
  name: PP-OCRv5_mobile_rec
  official_config: configs/rec/PP-OCRv5/PP-OCRv5_mobile_rec.yml
  pretrained_file: PP-OCRv5_mobile_rec_pretrained.pdparams
  pretrained_url: https://paddle-model-ecology.bj.bcebos.com/paddlex/official_pretrained_model/PP-OCRv5_mobile_rec_pretrained.pdparams
  inference_dir_name: ppocrv5_mobile_rec_cpu_infer
  device: cpu
  engine: paddle_static
  cpu_threads: 8

dataset:
  val_ratio: 0.2
  random_seed: 20260526
  image_extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .tif
    - .tiff

training:
  epoch_num: 20
  batch_size_per_card: 16
  num_workers: 0
  learning_rate: 0.0001
  print_batch_step: 10
  save_epoch_step: 5
  eval_batch_step:
    - 0
    - 100
  max_text_length: 3

hotzone_order:
  - h1
  - h2
  - h3
  - h4
  - h5
  - h6
  - h7
  - h8

hotzones:
  h1:
    box:
    preprocess:
      gray: false
      contrast: 1.0
      brightness: 0
      sharpen_strength: 0.0
      threshold:
        enabled: false
        value: 0
        max_value: 255
        mode: binary
